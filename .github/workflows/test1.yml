name: Advanced CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: "DevOps-Demo-App"

jobs:

  # -----------------------------
  # Job 1: Build Job
  # -----------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Display Environment Info
        run: |
          echo "Application Name: $APP_NAME"
          echo "Branch Name: $GITHUB_REF"
          echo "Commit SHA: $GITHUB_SHA"
          echo "Runner OS: $RUNNER_OS"

      - name: Create Build Artifact
        run: |
          mkdir build
          echo "Build successful at $(date)" > build/output.txt
          cat build/output.txt

      - name: Archive Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build/

  # -----------------------------
  # Job 2: Test Job
  # -----------------------------
  test:
    runs-on: ubuntu-latest
    needs: build   # This ensures test runs only after build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: downloaded-build

      - name: Verify Artifact
        run: |
          echo "Listing downloaded files:"
          ls -la downloaded-build
          echo "Reading build output:"
          cat downloaded-build/output.txt

      - name: Run Conditional Step (Only on main branch)
        if: github.ref == 'refs/heads/main'
        run: echo "Running tests on MAIN branch"

      - name: Simulate Test Execution
        run: |
          echo "Running automated tests..."
          sleep 3
          echo "All tests passed successfully!"
